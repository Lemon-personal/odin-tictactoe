<!DOCTYPE html>
<html lang="eg">
    <head>
        <meta charset="UTF-8">
        <TITLE> Sketch </TITLE>
        <link rel="stylesheet" href="style.css">
        <script src="tictactoe.js" defer></script>
    </head>
    <body>
        <div class = "game">
            <div class = "scoreboard">
                <section class = "player1-score">
                    <h1>test</h1>
                    <h1 class = "score">0</h1>
                </section>
                <img class = "turn-arrow" src="icons/arrow-left-bold.svg">
                <section class = "player2-score">
                    <h1>test</h1>
                    <h1 class = "score">0</h1>
                </section>
            </div>
            <div class = "board-container"></div>
        </div>
        

        <div class = "results disabled">
                <h1></h1>
                <h3 class = "result-player"></h3>
                <div>
                    <button class = "quit">QUIT</button>
                    <button class = "continue">CONTINUE</button>
                </div>
        </div>


        <div class = "main-menu disabled">
            <div class = "selection">
                <h3>PLEASE ENTER YOUR NAMES</h3>
                <div class = "name-fields">
                    <div class = "player-selection" tabindex="0">
                        <input type="text" name = "name-input" class = "x-name" placeholder="Player 1">
                        <div class = "mark-icon"> <img src="icons/close (1).svg"> </div>
                    </div>
                    <div class = player-selection tabindex="0">
                        <input type="text" name = "name-input" class = "o-name" placeholder="Player 2">
                        <div class = "mark-icon"> <img src="icons/circle-outline.svg"> </div>
                    </div>
                </div>
            </div>
            <button class = "start-game">START GAME</button>
        </div>
    </body>
